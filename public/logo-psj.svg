  </defs>

  <!-- Code Bracket "<" -->
  <path d="M 40 60 L 15 100 L 40 140" fill="none" stroke="#00c8d7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Code Bracket ">" -->
  <path d="M 170 60 L 195 100 L 170 140" fill="none" stroke="#7c6af7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- PSJ Original Monogram -->
  <g fill="none" stroke="url(#psjGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- P -->
    <path d="M60 50 V150 M60 50 H95 Q120 50 120 80 Q120 110 95 110 H60"/>
    <!-- S -->
